<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mizzit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="/index.html">← feed</a>
        <span id="nav-username"></span>
    </nav>

    <div id="profile-container">
        <div id="profile-header">
            <h2 id="profile-name"></h2>
            <p id="profile-count"></p>
            <button id="delete-btn" style="display:none" onclick="confirmDelete()">delete account</button>
        </div>
        <div id="profile-feed"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        const user = getUser()
        if (!user) window.location.href = '/login.html'
        document.getElementById('nav-username').textContent = user?.username

        // check if we're viewing someone else's profile or our own
        // usage: profile.html?user=marcelou
        const params = new URLSearchParams(window.location.search)
        const profileUsername = params.get('user') || user.username
        const isOwnProfile = profileUsername === user.username

        document.getElementById('profile-name').textContent = profileUsername

        // only show delete button on your own profile
        if (isOwnProfile) {
            document.getElementById('delete-btn').style.display = 'block'
        }

        async function loadProfile() {
            const feed = document.getElementById('profile-feed')
            feed.textContent = 'loading !!'

            const { data: posts, error } = await db
                .from('posts')
                .select('*')
                .eq('username', profileUsername)
                .order('created_at', { ascending: false })

            if (error) {
                feed.textContent = 'something went wrong :('
                return
            }

            document.getElementById('profile-count').textContent = 
                posts.length === 0 ? 'no posts yet !!' :
                posts.length === 1 ? '1 post' :
                `${posts.length} posts`

            if (posts.length === 0) {
                feed.textContent = ''
                return
            }

            feed.innerHTML = ''
            posts.forEach(post => {
                const item = document.createElement('div')
                item.className = 'post'
                item.innerHTML = `
                    <img src="${post.image_url}" alt="photo by ${post.username}" />
                    <div class="post-info">
                        <span class="post-caption">${post.caption}</span>
                        <span class="post-time">${formatTime(post.created_at)}</span>
                        ${isOwnProfile ? `<button class="delete-post-btn" onclick="deletePost(${post.id})">delete</button>` : ''}
                    </div>
                `
                feed.appendChild(item)
            })
        }

        async function deletePost(postId) {
            if (!confirm('delete this post??')) return
            
            const { error } = await db
                .from('posts')
                .delete()
                .eq('id', postId)
                .eq('username', user.username) // safety check!!

            if (error) {
                alert('something went wrong :(' )
                return
            }
            loadProfile()
        }

        async function confirmDelete() {
            if (!confirm('delete your entire account?? this cannot be undone !!')) return
            if (!confirm('are you really sure?? everything goes !!')) return

            // delete all their posts first
            await db.from('posts').delete().eq('username', user.username)
            // delete the user
            await db.from('users').delete().eq('id', user.id)

            logout()
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp)
            const now = new Date()
            const diff = Math.floor((now - date) / 1000)
            if (diff < 60) return 'just now !!'
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`
            return date.toLocaleDateString()
        }

        loadProfile()
    </script>
</body>
</html>
