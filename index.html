<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mizzit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <span id="nav-username"></span>
        <div id="nav-links"></div>
    </nav>

    <div id="feed"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        const user = getUser()

        if (user) {
            document.getElementById('nav-username').textContent = user.username
            document.getElementById('nav-links').innerHTML = `
                <a href="/camera.html">📷 post</a>
                <a href="/profile.html">my posts</a>
                <button onclick="logout()">log out</button>
            `
        } else {
            document.getElementById('nav-links').innerHTML = `
                <a href="/login.html">log in</a>
            `
        }

        async function loadFeed() {
            const feed = document.getElementById('feed')
            feed.textContent = 'loading !!'

            const { data: posts, error } = await db
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false })

            if (error) {
                feed.textContent = 'something went wrong :('
                return
            }

            if (posts.length === 0) {
                feed.textContent = 'no posts yet!! be the first 📷'
                return
            }

            feed.innerHTML = ''
            posts.forEach(post => {
                const item = document.createElement('div')
                item.className = 'post'

                const img = document.createElement('img')
                img.src = post.image_url
                img.alt = `photo by ${post.username}`

                const info = document.createElement('div')
                info.className = 'post-info'

                const username = document.createElement('span')
                username.className = 'post-username'
                username.textContent = post.username

                const caption = document.createElement('span')
                caption.className = 'post-caption'
                caption.textContent = post.caption

                const time = document.createElement('span')
                time.className = 'post-time'
                time.textContent = formatTime(post.created_at)

                info.append(username, caption, time)
                item.append(img, info)
                
                feed.appendChild(item)
            })
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp)
            const now = new Date()
            const diff = Math.floor((now - date) / 1000)

            if (diff < 60) return 'just now !!'
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`
            return date.toLocaleDateString()
        }

        loadFeed()
    </script>
</body>
</html>
